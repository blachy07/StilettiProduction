<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard — Pannello Admin</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="stylesheet" href="admin.css">
</head>
<body>

<header class="admin-header">
    <span class="admin-logo">VITTORIO<span>.</span> ADMIN</span>
    <div class="admin-header-actions">
        <a class="admin-back" href="../index.html">← SITO</a>
        <button class="admin-btn-logout" id="logout-btn" type="button">ESCI</button>
    </div>
</header>

<main class="admin-main">
    <div class="admin-top-row">
        <div>
            <div class="admin-title">CONSEGNE</div>
            <div class="admin-subtitle" id="deliveries-count"></div>
        </div>
        <div class="flex-row">
            <input class="admin-search" type="text" id="search-input" placeholder="Cerca per cliente o titolo...">
            <button class="btn-primary" id="new-delivery-btn" type="button">+ NUOVA CONSEGNA</button>
        </div>
    </div>

    <div class="stats-row" id="stats-row" hidden>
        <div class="stat-card">
            <div class="stat-value" id="stat-total">0</div>
            <div class="stat-label">CONSEGNE TOTALI</div>
        </div>
        <div class="stat-card accent">
            <div class="stat-value" id="stat-active">0</div>
            <div class="stat-label">ATTIVE</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-expired">0</div>
            <div class="stat-label">SCADUTE</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="stat-files">0</div>
            <div class="stat-label">FOTO/VIDEO TOTALI</div>
        </div>
    </div>

    <div class="admin-loading" id="loading-state">
        <span class="spinner"></span> Caricamento consegne...
    </div>

    <div class="admin-table-wrap" id="table-wrap" hidden>
        <table class="admin-table">
            <thead>
                <tr>
                    <th>Cliente</th>
                    <th>Titolo</th>
                    <th>PIN</th>
                    <th>Foto/Video</th>
                    <th>Scadenza</th>
                    <th>Stato</th>
                    <th>Azioni</th>
                </tr>
            </thead>
            <tbody id="deliveries-tbody"></tbody>
        </table>
        <div class="empty-state" id="empty-state" hidden>
            <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="14" rx="2"/><path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
            <span id="empty-state-text">Nessuna consegna ancora. Creane una con "+ Nuova Consegna".</span>
        </div>
    </div>
</main>

<div class="modal-overlay" id="new-modal-overlay">
    <form class="modal" id="new-delivery-form" autocomplete="off">
        <h3>NUOVA CONSEGNA</h3>

        <div class="admin-field">
            <label for="nd-client">NOME CLIENTE</label>
            <input type="text" id="nd-client" autofocus required>
        </div>

        <div class="admin-field">
            <label for="nd-title">TITOLO EVENTO</label>
            <input type="text" id="nd-title" required>
        </div>

        <div class="admin-field">
            <label for="nd-pin">PIN (6 caratteri, lettere e numeri)</label>
            <div class="pin-generate-row">
                <input type="text" id="nd-pin" maxlength="6" minlength="6" pattern="[A-Za-z0-9]{6}" autocomplete="off" required>
                <button class="btn-ghost" id="nd-generate-pin" type="button">GENERA</button>
            </div>
        </div>

        <div class="admin-field">
            <label for="nd-expiry">SCADENZA (opzionale)</label>
            <input type="date" id="nd-expiry">
        </div>

        <div class="admin-field">
            <label for="nd-notes">NOTE (opzionale)</label>
            <input type="text" id="nd-notes">
        </div>

        <p class="modal-feedback" id="new-delivery-feedback" aria-live="polite"></p>

        <div class="modal-actions">
            <button class="btn-ghost" type="button" id="nd-cancel">ANNULLA</button>
            <button class="btn-primary" type="submit">CREA E CARICA FOTO →</button>
        </div>
    </form>
</div>

<script src="toast.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
