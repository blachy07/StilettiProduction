<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rukeli | VittorioProduction</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>
    <!-- CSS Principale -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* ===== COMING SOON OVERLAY ===== */
        .coming-soon {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .coming-soon img {
            width: 100%;
            height: 300px;
            object-fit: cover;
            filter: brightness(0.6);
            border-radius: 18px;
        }

        .coming-soon-text {
            position: absolute;
            color: #ffffff;
            font-size: 2rem;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header class="header liquid-glass glass-navbar">
        <nav class="navbar">
            <a href="index.html" class="logo" aria-label="Vai alla Home">
                <img src="img/logo.png" alt="VittorioProduction Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="portfolio.html" class="active">Portfolio</a></li>
                <li><a href="contatti.html">Contatti</a></li>
            </ul>
        </nav>
    </header>

    <!-- Galleria Fotografica -->
    <section class="portfolio">
        <div class="container">
            <h2>Galleria Fotografica</h2>
            <div class="portfolio-grid">
                <article class="portfolio-item coming-soon">
                    <img src="https://images.unsplash.com/photo-1507525428034-b723cf961d3e"
                         alt="Rukeli - Prossimamente"
                         loading="lazy">
                    <div class="coming-soon-text">Prossimamente</div>
                </article>
            </div>

            <!-- Pulsante di ritorno -->
            <div class="portfolio-btn">
                <a href="portfolio.html" class="btn-primary">← Torna al Portfolio Completo</a>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <img src="img/logo.png" alt="VittorioProduction Logo" class="footer-logo">
        <p>© 2026 VittorioProduction. Tutti i diritti riservati.</p>
    </footer>

    <!-- Custom Cursor -->
    <div class="cursor-liquid glass-cursor" aria-hidden="true"></div>

    <!-- Script -->
    <script src="js/script.js"></script>
</body>
</html>
