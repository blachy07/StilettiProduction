<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grazie | VittorioProduction</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f7fa, #e9eef5);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            text-align: center;
            color: #333;
        }
        .container {
            background: #ffffff;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            max-width: 500px;
        }
        h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }
        p {
            font-size: 16px;
            line-height: 1.6;
        }
        .btn {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 8px;
        }
        .btn:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Grazie per averci contattato!</h1>
        <p>
            La tua richiesta è stata inviata con successo.
            Ti risponderemo al più presto con un preventivo personalizzato.
        </p>
        <p>
            Se non ricevi una risposta entro 24 ore, controlla la cartella spam
            oppure contattaci direttamente tramite WhatsApp.
        </p>
        <a href="index.html" class="btn">Torna alla Home</a>
    </div>
</body>
</html>
