<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VittorioProduction | Cerimonie</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="img/favicon.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- CSS Principale -->
    <link rel="stylesheet" href="css/style.css">

    <style>
        /* ===== TITOLO CENTRALE ===== */
        .page-title-centered {
            padding: 120px 20px 60px;
            text-align: center;
        }

        .page-title-centered h1 {
            font-size: 2.8rem;
            font-weight: 600;
        }

        .page-title-centered p {
            color: #666;
            margin-top: 10px;
        }

        /* ===== SEZIONE PORTFOLIO ===== */
        .portfolio {
            padding: 50px 20px;
        }

        .portfolio-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 280px));
            justify-content: center;
            gap: 30px;
            margin: 0 auto;
        }

        .portfolio-item {
            background: #ffffff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            text-align: center;
        }

        .portfolio-item:hover {
            transform: translateY(-8px);
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
        }

        .portfolio-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
        }

        .portfolio-info {
            padding: 18px;
            text-align: center;
        }

        .portfolio-info h3 {
            font-size: 1.2rem;
            margin-bottom: 10px;
        }

        /* ===== BOTTONI ===== */
        .btn {
            display: inline-block;
            margin-top: 10px;
            padding: 10px 20px;
            background: #000;
            color: #fff;
            text-decoration: none;
            border-radius: 25px;
            font-size: 0.9rem;
            transition: all 0.3s ease;
        }

        .btn:hover {
            background: #333;
            transform: translateY(-2px);
        }

        .back-to-portfolio {
            text-align: center;
            margin-top: 40px;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 768px) {
            .page-title-centered h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <!-- Navbar -->
    <header class="header liquid-glass glass-navbar">
        <nav class="navbar">
            <a href="index.html" class="logo" aria-label="Vai alla Home">
                <img src="img/logo.png" alt="VittorioProduction Logo" class="logo-img">
            </a>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="portfolio.html" class="active">Portfolio</a></li>
                <li><a href="contatti.html">Contatti</a></li>
            </ul>
        </nav>
    </header>

    <!-- Titolo Centrale -->
    <section class="page-title-centered">
        <div class="container">
            <h1>Cerimonie</h1>
            <p>Emozioni autentiche raccontate attraverso immagini e video</p>
        </div>
    </section>

    <!-- Sezione Cerimonie -->
    <section class="portfolio">
        <div class="container">
            <div class="portfolio-grid">

                <!-- Diciottesimo -->
                <article class="portfolio-item">
                    <img src="img/diciottesimo1/diciottesimo1.webp" alt="Diciottesimo" loading="lazy">
                    <div class="portfolio-info">
                        <h3>Diciottesimo Alessandro</h3>
                        <a href="diciottesimo.html" class="btn">Vedi foto</a>
                    </div>
                </article>

            </div>

            <!-- Pulsante Torna al Portfolio -->
            <div class="back-to-portfolio">
                <a href="portfolio.html" class="btn">
                    ← Torna al Portfolio Completo
                </a>
            </div>

        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <img src="img/logo.png" alt="VittorioProduction Logo" class="footer-logo">
        <p>© 2026 VittorioProduction. Tutti i diritti riservati.</p>
    </footer>

    <!-- Custom Cursor -->
    <div class="cursor-liquid glass-cursor" aria-hidden="true"></div>

    <script src="js/script.js"></script>
</body>
</html>
